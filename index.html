<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>unguided2siweb</title>
        <link rel="stylesheet" href="stylesheet.css">
    </head>

    <body>
        <div class="box">
            <h2>Form Sign In</h2>
            <hr>

            <label>Username</label>
            <input type="text" id="username" placeholder="Masukkan username">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password">

            <div id="error"></div>
            
            <hr>

                <button onclick="Login()">Sign In</button>
        </div>

        <script>
            function Login(){
                let username = document.getElementById("username").value;
                let password = document.getElementById("password").value;
                let error = document.getElementById("error");

                if(username === "" || password === ""){
                    error.innerHTML = "Username atau Password tidak boleh kosong";
                    return;
                }
                if(password.length < 8){
                    error.innerHTML = "Password tidak boleh kurang dari 8 Karakter";
                    return;
                }
                if(password.length > 16){
                    error.innerHTML = "Password tidak boleh lebih dari 16 Karakter";
                    return;
                }   
                window.location.href = "https://www.instagram.com/pratistha_nat?igsh=MXVkeW1oNjRhZWxjbQ==";
            }
        </script>
    </body>
</html>
